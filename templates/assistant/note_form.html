{% extends 'base.html' %}

{% block title %}{{ action }} Note - AI Todo Assistant{% endblock %}

{% block content %}
<h2>{{ action }} Note</h2>
<hr>

<div class="row">
    <div class="col-md-8">
        <form method="post" class="card p-4">
            {% csrf_token %}
            <div class="mb-3">
                <label for="{{ form.title.id_for_label }}" class="form-label">Title</label>
                {{ form.title }}
            </div>
            <div class="mb-3">
                <label for="{{ form.content.id_for_label }}" class="form-label">Content</label>
                {{ form.content }}
            </div>
            <button type="submit" class="btn btn-primary">{{ action }} Note</button>
            <a href="{% url 'notes_list' %}" class="btn btn-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
